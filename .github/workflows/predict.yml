name: AFL Predictions

on:
  # Thursday 6am AEST (= Wednesday 8pm UTC). AFL rounds start Thursday night.
  schedule:
    - cron: '0 20 * * 3'
  # Also allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction pipeline
        run: python pipeline.py

      - name: Commit and push predictions
        run: |
          git config user.name  "AFL Predictor Bot"
          git config user.email "action@github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Update predictions $(date -u +%Y-%m-%d)"
          git push
